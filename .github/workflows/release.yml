name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Read version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        shell: bash
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Publish release
        if: steps.check.outputs.exists == 'false'
        shell: bash
        run: |
          VERSION=${{ steps.pkg.outputs.version }}
          gh release create "v${VERSION}" \
            "dist/SOL-HUD-Setup-${VERSION}.exe" \
            "dist/SOL-HUD-Setup-${VERSION}.exe.blockmap" \
            "dist/latest.yml" \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
