<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sol HUD</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">
      <div id="login-bonus-toast" hidden>LOGIN BONUS +25 XP</div>
      <div id="share-toast" hidden>Card saved!</div>
      <div id="tilt-alert" hidden></div>
      <div id="boss-defeated-toast" hidden>BOSS DEFEATED 🏆</div>
      <div id="start-screen">
        <div class="version-badge">v0.15.0 MVP</div>
        <h2>SOL TRADER HUD</h2>
        <label>
          Lives (1-5):
          <input id="cfg-lives" type="number" min="1" max="5" value="3">
        </label>
        <label>
          SOL Limit:
          <input id="cfg-sol" type="number" step="0.01" value="0.15">
        </label>
        <button id="btn-start" type="button">START SESSION</button>
      </div>

      <div id="hud-container" hidden>
        <div id="mini-bar" class="mini-bar">
          <div class="lives-display" aria-label="Lives">
            <span>❤️</span>
            <span>❤️</span>
            <span>❤️</span>
            <span>🖤</span>
          </div>
          <div class="stats-mini">W:0 L:0 0%</div>
          <div id="streak-display" hidden></div>
          <button id="btn-vault" type="button">Vault</button>
          <button id="btn-settings" type="button" aria-label="Settings">&#9881;</button>
          <div class="version-mini">v0.15.0</div>
          <button id="btn-expand" type="button" aria-label="Expand">≡</button>
        </div>

        <div id="vault-panel" hidden>
          <div class="vault-header">
            <strong>Trader Vault</strong>
            <button id="btn-vault-close" type="button" aria-label="Close Vault">x</button>
          </div>
          <div id="vault-tabs" class="vault-tabs">
            <button type="button" data-category="heart_skins">Hearts</button>
            <button type="button" data-category="borders">Borders</button>
            <button type="button" data-category="sound_packs">Sounds</button>
            <button type="button" data-category="titles">Titles</button>
          </div>
          <div id="vault-grid" class="vault-grid"></div>
        </div>

        <div id="expanded-panel" hidden>
          <div class="panel-header">
            <div class="lives-row" aria-label="Lives">
              <span>❤️</span>
              <span>❤️</span>
              <span>❤️</span>
              <span>🖤</span>
            </div>
            <div id="session-timer" hidden>00:00:00</div>
            <button id="btn-heatmap" type="button" hidden>24h</button>
            <div class="version-mini">v0.15.0 MVP</div>
            <button id="btn-collapse" type="button" aria-label="Collapse">×</button>
          </div>

          <div id="comeback-banner" hidden>COMEBACK SESSION — 2× XP</div>
          <div id="settings-panel" hidden>
            <label>
              Opacity:
              <input id="opacity-slider" type="range" min="25" max="100" value="100">
            </label>
            <span id="opacity-value">100%</span>
          </div>

          <div id="boss-fight-banner" hidden>
            <h3 id="boss-fight-title"></h3>
            <p id="boss-fight-desc"></p>
            <span id="boss-timer">00:00:00</span>
          </div>

          <div id="heatmap-panel" hidden></div>

          <div class="stats-grid">
            <div>
              <span>Attempts</span>
              <strong>0</strong>
            </div>
            <div>
              <span>Wins</span>
              <strong>0</strong>
            </div>
            <div>
              <span>Win Rate</span>
              <strong>0%</strong>
            </div>
            <div>
              <span>Passive</span>
              <strong>OFF</strong>
            </div>
          </div>

          <div id="pnl-display" class="pnl-positive">P&amp;L: 0.000 SOL</div>

          <div class="checklist">
            <label><input type="checkbox"> Setup aligned</label>
            <label><input type="checkbox"> Trend confirmed</label>
            <label><input type="checkbox"> Risk accepted</label>
            <label><input type="checkbox"> News checked</label>
          </div>

          <div id="session-over" hidden>Session over. GG.</div>

          <div class="pnl-input-row">
            <input id="pnl-input" type="number" step="0.001" placeholder="0.000 SOL">
          </div>

          <div class="action-buttons">
            <button id="btn-entry" type="button">✅ ENTRY</button>
            <button id="btn-pass" type="button">❌ PASS</button>
            <button id="btn-sl" type="button">💀 SL</button>
          </div>

          <button id="btn-end-session" type="button">End Session</button>

          <div id="summary-screen" hidden></div>
        </div>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
