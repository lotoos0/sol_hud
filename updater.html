<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      height: 90px;
      background: transparent;
      font-family: "Segoe UI", Arial, sans-serif;
      user-select: none;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .card {
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      border: 1px solid rgba(0, 255, 136, 0.25);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 18px;
      gap: 8px;
    }

    .title {
      font-size: 11px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status {
      font-size: 11px;
      color: rgba(239, 255, 247, 0.55);
    }

    .progress-wrap {
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: #00ff88;
      border-radius: 2px;
      width: 0%;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">SOL HUD</div>
    <div class="status" id="status">Checking for updates...</div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');

    window.electronAPI.onUpdaterStatus(({ state, percent }) => {
      if (state === 'checking') {
        statusEl.textContent = 'Checking for updates...';
      } else if (state === 'no-update') {
        statusEl.textContent = 'Up to date.';
      } else if (state === 'downloading') {
        statusEl.textContent = `Downloading update... ${percent}%`;
        progressWrap.style.display = 'block';
        progressBar.style.width = percent + '%';
      } else if (state === 'restarting') {
        statusEl.textContent = 'Restarting to apply update...';
        progressWrap.style.display = 'none';
      } else if (state === 'error') {
        statusEl.textContent = 'Starting...';
      }
    });
  </script>
</body>
</html>
